# Include this inside the Fleet Management Nginx server block.
# It does not change authentication or application routing.

gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_comp_level 5;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

location ^~ /build/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    try_files $uri =404;
}

location ^~ /js/dist/ {
    expires 30d;
    add_header Cache-Control "public, immutable" always;
    try_files $uri =404;
}

location ^~ /css/ {
    expires 30d;
    add_header Cache-Control "public" always;
    try_files $uri =404;
}

location ^~ /images/ {
    expires 30d;
    add_header Cache-Control "public" always;
    try_files $uri =404;
}
